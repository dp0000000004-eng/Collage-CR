{% extends 'panel/layout_panel.html' %}

{% block panel_title %}Edit Student{% endblock %}

{% block panel_content %}
<div class="page-header">
  <div>
    <span class="page-header__eyebrow">Admin Panel</span>
    <h1>Edit {{ student.name }}</h1>
  </div>
  <a href="{% url 'panel_students' %}" class="btn btn--ghost btn--sm">← Back</a>
</div>

<div class="card form-card" style="max-width: 520px;">
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex" style="gap: 10px; flex-wrap: wrap;">
      <button type="submit" class="btn btn--primary">Save changes</button>
      <a href="{% url 'panel_students' %}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
